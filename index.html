<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЁБЫЧ SLOTS | STABLE VERSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050507; --panel: #0f0f13; --accent: #ffb800; --success: #00ff85;
            --danger: #ff4b4b; --text: #ffffff; --overlay: rgba(0, 0, 0, 0.98);
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(15, 15, 19, 0.98); backdrop-filter: blur(10px);
            border-bottom: 1px solid #1c1c21; display: flex; align-items: center;
            justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .site-icon { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); background: #111; }
        .logo { font-weight: 900; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }

        .nav-tabs { display: flex; gap: 25px; transition: 0.3s; }
        .nav-tabs.disabled { opacity: 0.1; pointer-events: none; }
        .tab-link { color: #444; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 11px; transition: 0.3s; padding: 5px 0; }
        .tab-link:hover { color: var(--accent); }
        .tab-link.active { color: var(--text); border-bottom: 2px solid var(--accent); }

        /* ДИЗАЙН НИКА (БЕЛЫЙ, ОБЫЧНЫЙ, ПОДЧЕРКНУТЫЙ) */
        .user-info-area { display: flex; align-items: center; gap: 20px; }
        .user-name-label {
            color: #fff;
            font-weight: 400; /* Обычный шрифт */
            font-size: 14px;
            text-transform: uppercase;
            border-bottom: 1px solid #fff; /* Подчеркнут белой линией */
            padding-bottom: 2px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .balance-frame { border: 1px solid #25252b; padding: 8px 18px; border-radius: 10px; cursor: pointer; position: relative; transition: 0.2s; }
        .bal-val { font-weight: 400; color: #fff; font-size: 15px; }

        .bal-diff { position: absolute; left: 50%; transform: translateX(-50%); font-size: 14px; color: #fff; pointer-events: none; opacity: 0; white-space: nowrap; z-index: 100; }
        .bal-diff.up { bottom: 120%; animation: floatUp 1s forwards; }
        .bal-diff.down { top: 120%; animation: floatDown 1s forwards; }
        @keyframes floatUp { 0% { opacity: 0; transform: translate(-50%, 10px); } 20% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -25px); } }
        @keyframes floatDown { 0% { opacity: 0; transform: translate(-50%, -10px); } 20% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, 25px); } }

        /* --- LAYOUT --- */
        .container { margin-top: 100px; display: flex; justify-content: center; padding-bottom: 50px; }
        .page { display: none; width: 98%; max-width: 1400px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); display: none; z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-card { background: var(--panel); border: 1px solid #222; width: 90%; max-width: 400px; padding: 40px; border-radius: 35px; text-align: center; box-shadow: 0 0 60px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; }
        .auth-input { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 18px; border-radius: 15px; outline: none; font-family: 'Montserrat'; text-align: center; font-size: 16px; box-sizing: border-box; margin-bottom: 12px; }
        .btn-auth { width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }

        /* GAMES */
        .slots-card, .upgrade-card, .crash-card { background: var(--panel); border-radius: 30px; padding: 40px; border: 1px solid #1c1c24; text-align: center; width: 100%; box-sizing: border-box; }
        .reels-area { position: relative; display: flex; gap: 8px; justify-content: center; background: #000; padding: 15px; border-radius: 20px; margin-bottom: 30px; overflow: hidden; height: 450px; }
        .win-frame { position: absolute; top: 50%; left: 0; width: 100%; height: 150px; transform: translateY(-50%); border-top: 1px solid rgba(255,184,0,0.4); border-bottom: 1px solid rgba(255,184,0,0.4); background: rgba(255,184,0,0.05); z-index: 10; pointer-events: none; }
        .reel { flex: 1; min-width: 80px; max-width: 160px; background: #07070a; border-radius: 8px; position: relative; overflow: hidden; }
        .reel-strip { position: absolute; width: 100%; top: 0; }
        .symbol { height: 150px; display: flex; align-items: center; justify-content: center; }
        .symbol img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 1px solid #222; }

        .upgrader-bg-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 260px; height: 260px; border-radius: 50%; opacity: 0.15; }
        #upgradeCanvas { transform: rotate(-90deg); position: relative; z-index: 1; }
        .orb-path { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .orb-triangle { position: absolute; top: 10px; left: calc(50% - 15px); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fff; filter: drop-shadow(0 0 10px var(--accent)); }

        .canvas-area { background: #000; border-radius: 20px; height: 650px; position: relative; overflow: hidden; border: 1px solid #1c1c24; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 120px 120px; }
        #crashMultiplier { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); font-size: 110px; font-weight: 900; z-index: 20; color: #fff; }
        .rocket-container { position: absolute; width: 280px; height: 280px; left: calc(50% - 140px); bottom: 20px; transition: bottom 0.1s linear; }
        .rocket-img { width: 100%; height: 100%; background: url('rocket.png') no-repeat center center; background-size: contain; }

        .btn-main { padding: 22px; background: linear-gradient(135deg, var(--accent) 0%, #ff8a00 100%); border: none; border-radius: 18px; color: #000; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.2s; }
        
        #winOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .jackpot-text { font-size: 80px; font-weight: 900; color: var(--accent); text-shadow: 0 0 30px orange; animation: pulse 0.4s infinite alternate; }
        .win-amt-text { font-size: 50px; font-weight: 700; color: #fff; margin-top: 10px; }
        .coin { position: absolute; width: 35px; height: 35px; background: gold; border-radius: 50%; border: 2px solid orange; z-index: 4000; }

        @media (max-width: 900px) {
            header { padding: 0 15px; } .logo { font-size: 14px; } .nav-tabs { gap: 10px; } .tab-link { font-size: 9px; }
            .user-info { gap: 10px; } .user-name-label { font-size: 11px; }
            .upgrade-card, .crash-card { grid-template-columns: 1fr; padding: 20px; } .visual-box { width: 280px; height: 280px; }
            .canvas-area { height: 400px; } .rocket-container { width: 150px; height: 150px; left: calc(50% - 75px); } #crashMultiplier { font-size: 40px; }
            .reels-area { height: 240px; } .symbol { height: 80px; } .symbol img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container"><img src="icon.png" alt="Icon" class="site-icon"><div class="logo">ЁБЫЧ <span>SLOTS</span></div></div>
    <div class="nav-tabs" id="navTabs">
        <div class="tab-link active" onclick="switchTab('slots', this)">Слоты</div>
        <div class="tab-link" onclick="switchTab('upgrader', this)">Апгрейдер</div>
        <div class="tab-link" onclick="switchTab('rocket', this)">Ракетка</div>
    </div>
    <div class="user-info">
        <div class="user-name-label" id="userNameDisp" onclick="openProfile()">...</div>
        <div class="balance-frame" id="balanceBtn" onclick="openProfile()">
            <span class="bal-val" id="balanceDisplay">0 Р</span>
        </div>
    </div>
</header>

<div class="modal-overlay" id="authModal" style="display: flex;">
    <div class="modal-card">
        <h2 style="margin:0; letter-spacing: 2px;">ВХОД</h2>
        <div class="auth-form" style="width:100%; margin-top:20px;">
            <input type="text" id="authName" class="auth-input" placeholder="ИМЯ ИГРОКА">
            <input type="password" id="authPass" class="auth-input" placeholder="ПАРОЛЬ">
            <button class="btn-auth" onclick="handleLogin()">ВОЙТИ</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="profileModal" onclick="this.style.display='none'">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h2 style="margin:0">ПРОФИЛЬ</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin:25px 0; width:100%;">
            <div style="background:#07070a; padding:15px; border-radius:15px; border:1px solid #1c1c24;">
                <div style="font-size:10px; color:#555; text-transform:uppercase;">Выиграно</div>
                <div id="statWon" style="color:var(--success); font-weight:900; font-size:18px;">0 Р</div>
            </div>
            <div style="background:#07070a; padding:15px; border-radius:15px; border:1px solid #1c1c24;">
                <div style="font-size:10px; color:#555; text-transform:uppercase;">Слито</div>
                <div id="statLost" style="color:var(--danger); font-weight:900; font-size:18px;">0 Р</div>
            </div>
        </div>
        <button class="btn-auth" style="background:#111; color:#fff; font-size:12px; padding:12px;" onclick="logout()">СМЕНИТЬ АККАУНТ</button>
    </div>
</div>

<div id="winOverlay"><div class="jackpot-text" id="jackTitle">JACKPOT</div><div id="jackAmt" style="color:#fff; font-size:40px; font-weight:900;">x256</div></div>

<div class="container">
    <div id="slots" class="page active">
        <div class="slots-card">
            <div class="reels-area">
                <div class="win-frame"></div>
                <div class="reel"><div class="reel-strip"></div></div><div class="reel"><div class="reel-strip"></div></div><div class="reel"><div class="reel-strip"></div></div><div class="reel"><div class="reel-strip"></div></div><div class="reel"><div class="reel-strip"></div></div><div class="reel"><div class="reel-strip"></div></div><div class="reel"><div class="reel-strip"></div></div>
            </div>
            <div style="max-width:400px; margin: 0 auto; width: 100%;">
                <input type="number" id="slotBet" value="100" class="auth-input">
                <button class="btn-main" id="spinBtn" onclick="startSlots()">Крутить</button>
            </div>
        </div>
    </div>

    <div id="upgrader" class="page">
        <div class="upgrade-card">
            <div class="visual-box">
                <img src="icon.png" class="upgrader-bg-icon">
                <canvas id="upgradeCanvas" width="400" height="400"></canvas>
                <div class="orb-path" id="orbPath"><div class="orb-triangle"></div></div>
                <div id="upChanceCenter" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:40px; font-weight:900; z-index:2;">50%</div>
            </div>
            <div style="display:flex; flex-direction:column; gap:10px; width:100%;">
                <input type="number" id="upAmount" value="500" class="auth-input" oninput="drawUpgrade()">
                <input type="range" id="upRange" min="1" max="75" value="50" oninput="drawUpgrade()" style="width:100%">
                <div id="upPayout" style="color:var(--success); font-size:24px; font-weight:900; text-align:center; margin:10px 0;">950 Р</div>
                <button class="btn-main" id="upBtn" onclick="startUpgrade()">Улучшить</button>
            </div>
        </div>
    </div>

    <div id="rocket" class="page">
        <div class="crash-card">
            <div class="canvas-area" id="crashCanvasArea">
                <div id="crashMultiplier" style="color:#fff;">x1.00</div>
                <div id="rocketContainer" class="rocket-container"><div class="rocket-img"></div></div>
            </div>
            <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
                <input type="number" id="crashBet" value="100" class="auth-input">
                <button class="btn-main" id="crashBtn" onclick="toggleCrash()">Взлет</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://gwtbnjoacgirwsbwnaan.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3dGJuam9hY2dpcndzYnduYWFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNjM0NTgsImV4cCI6MjA5OTYzOTQ1OH0.ga9HERWc7gXq9VWn8U5lpBon-YhwBjPWp5ENwUYyutU';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let user = null;
    let isGameRunning = false;
    let canCashOut = false;
    const textures = ['slot1.png', 'slot2.png', 'slot3.png', 'slot4.png'];

    async function handleLogin() {
        const name = document.getElementById('authName').value.trim().toLowerCase();
        const pass = document.getElementById('authPass').value;
        if(name.length < 2 || pass.length < 3) return alert("Заполни данные");

        // ПРЯМОЙ ЗАПРОС В ТАБЛИЦУ players
        let { data, error } = await sb.from('players').select('*').eq('username', name).single();

        if(!data) {
            const { data: newUser, error: err2 } = await sb.from('players').insert([{ username: name, password: pass, balance: 10000 }]).select().single();
            if(err2) return alert("Ошибка создания: " + err2.message);
            user = newUser;
        } else {
            if(data.password !== pass) return alert("Неверный пароль!");
            user = data;
        }

        localStorage.setItem('ebych_stable_session', name);
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('userNameDisp').innerText = user.username;
        updateUI();
    }

    async function checkAutoLogin() {
        const saved = localStorage.getItem('ebych_stable_session');
        if(saved) {
            let { data } = await sb.from('players').select('*').eq('username', saved).single();
            if(data) { user = data; document.getElementById('authModal').style.display = 'none'; document.getElementById('userNameDisp').innerText = user.username; updateUI(); }
        }
    }
    checkAutoLogin();

    function logout() { localStorage.removeItem('ebych_stable_session'); location.reload(); }

    async function sync(diff, won=0, lost=0) {
        if(!user) return;
        user.balance += diff; user.total_won += won; user.total_lost += lost;
        updateUI(diff);
        await sb.from('players').update({ balance: user.balance, total_won: user.total_won, total_lost: user.total_lost }).eq('username', user.username);
    }

    function updateUI(diff = 0) {
        if (diff !== 0) {
            const float = document.createElement('div');
            float.className = `bal-diff ${diff > 0 ? 'up' : 'down'}`;
            float.innerText = (diff > 0 ? '+' : '-') + Math.abs(diff).toLocaleString() + ' Р';
            document.getElementById('balanceBtn').appendChild(float);
            setTimeout(() => float.remove(), 1000);
        }
        document.getElementById('balanceDisplay').innerText = Math.floor(user.balance).toLocaleString() + " Р";
    }

    function openProfile() { if (isGameRunning) return; document.getElementById('statWon').innerText = user.total_won.toLocaleString() + " Р"; document.getElementById('statLost').innerText = user.total_lost.toLocaleString() + " Р"; document.getElementById('profileModal').style.display = 'flex'; }

    function switchTab(id, el) { if(isGameRunning) return; document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); if(id==='upgrader') setTimeout(drawUpgrade, 50); }

    /* SLOTS */
    function initStrips() { document.querySelectorAll('.reel-strip').forEach(s => { s.innerHTML = ''; for(let i=0; i<150; i++) { let d = document.createElement('div'); d.className='symbol'; let img = document.createElement('img'); img.src = textures[Math.floor(Math.random()*4)]; d.appendChild(img); s.appendChild(d); } }); }
    initStrips();

    async function startSlots() {
        const bet = parseInt(document.getElementById('slotBet').value);
        if(!bet || bet > user.balance || bet <= 0) return;
        lockUI(true); await sync(-bet, 0, bet);
        document.getElementById('spinBtn').disabled = true;
        const res = [];
        document.querySelectorAll('.reel-strip').forEach((s, i) => {
            const w = Math.floor(Math.random()*4); res.push(w);
            s.children[101].querySelector('img').src = textures[w];
            const sH = window.innerWidth < 900 ? 80 : 150;
            s.style.transition = 'none'; s.style.transform = 'translateY(0)';
            void s.offsetWidth; s.style.transition = `transform ${5 + (i * 1.5)}s cubic-bezier(0.1, 0, 0, 1)`;
            s.style.transform = `translateY(-${100 * sH}px)`;
        });
        setTimeout(async () => {
            document.getElementById('spinBtn').disabled = false; lockUI(false);
            const c = {}; res.forEach(v => c[v] = (c[v]||0)+1); const mSame = Math.max(...Object.values(c));
            let m = 0; if(mSame===4) m=2; else if(mSame===5) m=8; else if(mSame===6) m=128; else if(mSame===7) m=512;
            if(m > 0) { let w = bet * m; await sync(w, w, 0); showWinEffect(m); }
        }, 15000);
    }
    function showWinEffect(m) { if (m >= 128) { document.getElementById('jackTitle').innerText = m === 512 ? "MEGA JACKPOT" : "JACKPOT"; document.getElementById('jackAmt').innerText = "x" + m; document.getElementById('winOverlay').style.display = 'flex'; setTimeout(() => document.getElementById('winOverlay').style.display = 'none', 4000); } else { for(let i=0; i<40; i++) { let c = document.createElement('div'); c.className='coin'; c.style.left = Math.random()*100+'vw'; c.style.top='-50px'; document.body.appendChild(c); c.animate([{top:'-50px'},{top:'110vh'}], {duration:1000+Math.random()*2000}); setTimeout(() => c.remove(), 3000); } } }

    /* UPGRADER */
    const canvas = document.getElementById('upgradeCanvas'), ctx = canvas.getContext('2d');
    function drawUpgrade() { const c = document.getElementById('upRange').value, a = parseInt(document.getElementById('upAmount').value)||0; document.getElementById('upLabel').innerText = c+'%'; document.getElementById('upChanceCenter').innerText = c+'%'; document.getElementById('upPayout').innerText = Math.floor(a*(100/c*0.95)).toLocaleString()+' Р'; ctx.clearRect(0,0,400,400); ctx.beginPath(); ctx.arc(200,200,175,0,Math.PI*2); ctx.strokeStyle='#111'; ctx.lineWidth=15; ctx.stroke(); ctx.beginPath(); ctx.arc(200,200,175,0,(Math.PI*2)*(c/100)); ctx.strokeStyle='#ffb800'; ctx.lineWidth=15; ctx.lineCap='round'; ctx.stroke(); }
    async function startUpgrade() { const a = parseInt(document.getElementById('upAmount').value), c = parseInt(document.getElementById('upRange').value); if(!a || a > user.balance || a <= 0) return; lockUI(true); await sync(-a, 0, a); document.getElementById('upBtn').disabled = true; const start = performance.now(), rot = (360 * 5) + (Math.random() * 360); function animate(now) { const elapsed = now - start; const progress = Math.min(elapsed / 4000, 1); const eased = 1 - Math.pow(1 - progress, 3); const deg = rot * eased; document.getElementById('orbPath').style.transform = `rotate(${deg}deg)`; if(progress < 1) requestAnimationFrame(animate); else { if((deg % 360) <= (c / 100 * 360)) { let w = Math.floor(a * (100 / c * 0.95)); sync(w, w, 0); } document.getElementById('upBtn').disabled = false; lockUI(false); } } requestAnimationFrame(animate); }

    /* ROCKET */
    let crashActive = false, crashMultiplier = 1.0, crashInterval, canCashOut = false;
    async function toggleCrash() { const bet = parseInt(document.getElementById('crashBet').value); if(!crashActive) { if(!bet || bet > user.balance || bet <= 0) return; lockUI(true); await sync(-bet, 0, bet); crashActive = true; canCashOut = true; crashMultiplier = 1.0; let cp = (98 / (100 - Math.random() * 100)); document.getElementById('crashBtn').innerText = "ЗАБРАТЬ"; document.getElementById('crashBtn').classList.add('btn-danger'); let start = Date.now(); crashInterval = setInterval(() => { let elapsed = (Date.now() - start) / 1000; crashMultiplier = Math.pow(Math.E, 0.14 * elapsed); document.getElementById('crashMultiplier').innerText = "x" + crashMultiplier.toFixed(2); let r = document.getElementById('rocketContainer'); let y = 20 + (elapsed * 150); if(y > 180) y = 180; r.style.bottom = y + "px"; document.getElementById('crashCanvasArea').style.backgroundPosition = `center ${elapsed * 200}px`; if(crashMultiplier >= cp) { canCashOut = false; clearInterval(crashInterval); flyAway(); } }, 30); } else { if (!canCashOut) return; let w = Math.floor(bet * crashMultiplier); await sync(w, w, 0); finishRocket("УСПЕЛ!"); } }
    function flyAway() { let r = document.getElementById('rocketContainer'); r.style.transition = 'bottom 0.5s ease-in'; r.style.bottom = "1200px"; document.getElementById('crashMultiplier').innerText = "УЛЕТЕЛА!"; document.getElementById('crashMultiplier').style.color = "var(--danger)"; setTimeout(() => finishRocket("УЛЕТЕЛА!"), 500); }
    function finishRocket(msg) { clearInterval(crashInterval); crashActive = false; canCashOut = false; const btn = document.getElementById('crashBtn'); btn.innerText = "ВЗЛЕТ"; btn.classList.remove('btn-danger'); btn.disabled = true; document.getElementById('crashMultiplier').innerText = msg; setTimeout(() => { document.getElementById('crashMultiplier').style.color = "#fff"; document.getElementById('crashMultiplier').innerText = "x1.00"; let r = document.getElementById('rocketContainer'); r.style.transition = 'none'; r.style.bottom = "20px"; btn.disabled = false; lockUI(false); }, 2000); }

    function lockUI(s) { isGameRunning = s; document.getElementById('navTabs').classList.toggle('disabled', s); }

    drawUpgrade();
</script>
</body>
</html>
