<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЁБЫЧ SLOTS | FINAL PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050507; --panel: #0f0f13; --accent: #ffb800; --success: #00ff85;
            --danger: #ff4b4b; --text: #ffffff;
        }
        
        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; 
        }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 75px;
            background: #0f0f13; border-bottom: 1px solid #1c1c21; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; z-index: 9999;
        }
        .logo-container { display: flex; align-items: center; gap: 8px; }
        .site-icon { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--accent); }
        .logo { font-weight: 900; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .user-section { display: flex; align-items: center; gap: 10px; }
        .user-nickname { 
            color: #fff; font-size: 11px; text-transform: uppercase; 
            border-bottom: 1px solid #ffffff; cursor: pointer; /* БЕЛАЯ ЛИНИЯ */
            padding-bottom: 2px;
        }
        
        .balance-frame { 
            background: #16161c; padding: 8px 15px; border-radius: 10px; border: 1px solid #222; 
            cursor: pointer; position: relative;
        }
        .bal-val { font-weight: 400; color: #ffffff; font-size: 14px; }

        /* Всплывающее уведомление баланса (Белое, снизу) */
        .bal-float {
            position: absolute; left: 50%; transform: translateX(-50%);
            bottom: -30px; color: #ffffff !important; font-weight: 700; font-size: 13px;
            pointer-events: none; animation: floatUpBottom 1.2s ease-out forwards;
            white-space: nowrap; z-index: 100;
        }
        @keyframes floatUpBottom {
            0% { opacity: 0; bottom: -30px; }
            30% { opacity: 1; }
            100% { opacity: 0; bottom: 20px; }
        }

        /* --- NAVIGATION --- */
        .nav-tabs { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background: #0f0f13; display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid #1c1c24; z-index: 9999;
        }
        .nav-tabs.disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .tab-link { color: #555; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 10px; }
        .tab-link.active { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 5px; }

        .container { margin-top: 90px; padding: 10px; padding-bottom: 90px; display: flex; justify-content: center; }
        .page { display: none; width: 100%; max-width: 800px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- SLOTS --- */
        .reels-area { position: relative; display: flex; gap: 2px; justify-content: center; background: #000; padding: 5px; border-radius: 15px; margin-bottom: 20px; overflow: hidden; height: 220px; border: 1px solid #1c1c24; }
        .win-frame { position: absolute; top: 50%; left: 0; width: 100%; height: 65px; transform: translateY(-50%); border-top: 1px solid var(--accent); border-bottom: 1px solid var(--accent); background: rgba(255,184,0,0.05); z-index: 10; }
        .reel { flex: 1; background: #07070a; position: relative; overflow: hidden; }
        .symbol { height: 65px; display: flex; align-items: center; justify-content: center; }
        .symbol img { width: 90%; max-width: 40px; border-radius: 50%; object-fit: cover; }

        /* --- UPGRADER (УВЕЛИЧЕННЫЙ) --- */
        .visual-box { 
            position: relative; width: 380px; height: 380px; max-width: 95vw; max-height: 95vw;
            margin: 0 auto 30px; background: radial-gradient(circle, #1e1e2d 0%, #050507 80%); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            border: 1px solid #2a2a35; box-shadow: 0 0 50px rgba(255, 184, 0, 0.05);
        }
        #upgradeCanvas { width: 100%; height: 100%; z-index: 2; position: relative; transform: rotate(-90deg); }
        .upgrader-bg-icon { position: absolute; width: 180px; opacity: 0.12; z-index: 1; }
        .orb-path { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .orb-triangle { position: absolute; top: -15px; left: calc(50% - 18px); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid #fff; filter: drop-shadow(0 0 15px var(--accent)); }
        #upChanceCenter { position: absolute; font-size: 50px; font-weight: 900; z-index: 3; color: #fff; text-shadow: 0 0 30px #000; }

        /* --- ROCKET --- */
        .canvas-area { background: #000; border-radius: 20px; height: 420px; position: relative; overflow: hidden; border: 1px solid #1c1c24; margin-bottom: 15px; background-image: radial-gradient(#111 1px, transparent 1px); background-size: 40px 40px; }
        #crashMultiplier { position: absolute; top: 70px; width: 100%; text-align: center; font-size: 60px; font-weight: 900; z-index: 20; }
        .rocket-container { position: absolute; width: 150px; height: 150px; left: calc(50% - 75px); bottom: 20px; z-index: 15; }
        .rocket-img { width: 100%; height: 100%; background: url('rocket.png') no-repeat center; background-size: contain; }
        .rocket-fly-away { transition: transform 2.5s cubic-bezier(0.4, 0, 1, 1), bottom 2.5s cubic-bezier(0.4, 0, 1, 1) !important; transform: translateY(-1300px) translateX(400px) rotate(60deg) scale(0.2) !important; }

        /* --- BUTTONS & INPUTS --- */
        .controls-box { width: 100%; max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .auth-input { width: 100%; background: #16161c; border: 1px solid #222; color: #fff; padding: 16px; border-radius: 14px; text-align: center; font-size: 16px; font-family: 'Montserrat'; }
        .btn-main { width: 100%; padding: 20px; background: linear-gradient(135deg, var(--accent) 0%, #ff8a00 100%); border: none; border-radius: 14px; color: #000; font-weight: 900; font-size: 15px; cursor: pointer; text-transform: uppercase; }
        .btn-main:disabled { opacity: 0.3; filter: grayscale(1); }
        .btn-danger { background: linear-gradient(135deg, #ff4b4b 0%, #a30000 100%) !important; color: #fff !important; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; z-index: 10000; justify-content: center; align-items: center; }
        .modal-card { background: #0f0f13; border: 1px solid #222; width: 90%; max-width: 350px; padding: 30px; border-radius: 25px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="icon.png" class="site-icon">
        <div class="logo">ЁБЫЧ <span>SLOTS</span></div>
    </div>
    <div class="user-section">
        <div class="user-nickname" id="userNameDisp" onclick="logout()">...</div>
        <div class="balance-frame" onclick="deposit10k()">
            <span class="bal-val" id="balanceDisplay">0 руб.</span>
            <div id="floatContainer"></div>
        </div>
    </div>
</header>

<div class="nav-tabs" id="navTabs">
    <div class="tab-link active" onclick="switchTab('slots', this)">Слоты</div>
    <div class="tab-link" onclick="switchTab('upgrader', this)">Апгрейд</div>
    <div class="tab-link" onclick="switchTab('rocket', this)">Ракетка</div>
</div>

<div class="modal-overlay" id="authModal" style="display: flex;">
    <div class="modal-card">
        <h2>ВХОД</h2>
        <input type="text" id="authName" class="auth-input" placeholder="НИКНЕЙМ" style="margin-bottom:10px">
        <input type="password" id="authPass" class="auth-input" placeholder="ПАРОЛЬ" style="margin-bottom:20px">
        <button class="btn-main" onclick="handleLogin()">ИГРАТЬ</button>
    </div>
</div>

<div class="container">
    <div id="slots" class="page active">
        <div class="reels-area">
            <div class="win-frame"></div>
            <div class="reel"><div class="reel-strip"></div></div>
            <div class="reel"><div class="reel-strip"></div></div>
            <div class="reel"><div class="reel-strip"></div></div>
            <div class="reel"><div class="reel-strip"></div></div>
            <div class="reel"><div class="reel-strip"></div></div>
            <div class="reel"><div class="reel-strip"></div></div>
            <div class="reel"><div class="reel-strip"></div></div>
        </div>
        <div class="controls-box">
            <input type="number" id="slotBet" value="100" class="auth-input">
            <button class="btn-main" id="spinBtn" onclick="startSlots()">Крутить</button>
        </div>
    </div>

    <div id="upgrader" class="page">
        <div class="visual-box">
            <img src="icon.png" class="upgrader-bg-icon">
            <canvas id="upgradeCanvas" width="400" height="400"></canvas>
            <div class="orb-path" id="orbPath"><div class="orb-triangle"></div></div>
            <div id="upChanceCenter">50%</div>
        </div>
        <div class="controls-box">
            <input type="number" id="upAmount" value="500" class="auth-input" oninput="drawUpgrade()">
            <input type="range" id="upRange" min="1" max="85" value="50" oninput="drawUpgrade()" style="width:100%; margin: 15px 0; accent-color: var(--accent);">
            <div id="upPayout" style="color:var(--success); font-size:24px; font-weight:900; text-align:center; margin-bottom:15px;">950 руб.</div>
            <button class="btn-main" id="upBtn" onclick="startUpgrade()">Улучшить</button>
        </div>
    </div>

    <div id="rocket" class="page">
        <div class="canvas-area">
            <div id="crashMultiplier">x1.00</div>
            <div id="rocketContainer" class="rocket-container"><div class="rocket-img"></div></div>
        </div>
        <div class="controls-box">
            <input type="number" id="crashBet" value="100" class="auth-input">
            <button class="btn-main" id="crashBtn" onclick="toggleCrash()">Взлет</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://gwtbnjoacgirwsbwnaan.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3dGJuam9hY2dpcndzYnduYWFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNjM0NTgsImV4cCI6MjA5OTYzOTQ1OH0.ga9HERWc7gXq9VWn8U5lpBon-YhwBjPWp5ENwUYyutU';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let user = null, isGameRunning = false;
    const textures = ['slot1.png', 'slot2.png', 'slot3.png', 'slot4.png'];

    async function handleLogin() {
        const n = document.getElementById('authName').value.trim().toLowerCase(), p = document.getElementById('authPass').value;
        if(!n || !p) return;
        let { data } = await sb.from('players').select('*').eq('username', n).single();
        if(!data) {
            const { data: nU } = await sb.from('players').insert([{ username: n, password: p, balance: 10000 }]).select().single();
            user = nU;
        } else {
            if(data.password !== p) return;
            user = data;
        }
        localStorage.setItem('ebych_session_name', n);
        document.getElementById('authModal').style.display = 'none';
        updateUI();
    }

    async function checkAuth() {
        const n = localStorage.getItem('ebych_session_name');
        if(n) {
            let { data } = await sb.from('players').select('*').eq('username', n).single();
            if(data) { user = data; document.getElementById('authModal').style.display = 'none'; updateUI(); }
        }
    }
    checkAuth();

    function logout() { localStorage.removeItem('ebych_session_name'); location.reload(); }

    function updateUI(diff = 0) {
        if(!user) return;
        document.getElementById('userNameDisp').innerText = user.username;
        document.getElementById('balanceDisplay').innerText = Math.floor(user.balance).toLocaleString() + " руб.";
        if(diff !== 0) {
            const f = document.createElement('div'); f.className = 'bal-float';
            f.innerText = (diff > 0 ? '+' : '') + Math.floor(diff) + ' руб.';
            document.getElementById('floatContainer').appendChild(f);
            setTimeout(() => f.remove(), 1200);
        }
    }

    async function sync(diff) {
        user.balance += diff; updateUI(diff);
        await sb.from('players').update({ balance: user.balance }).eq('username', user.username);
    }

    function deposit10k() { if(!isGameRunning && user.balance < 10000) sync(10000 - user.balance); }

    function lockUI(s) {
        isGameRunning = s;
        document.getElementById('navTabs').classList.toggle('disabled', s);
        document.getElementById('spinBtn').disabled = s;
        document.getElementById('upBtn').disabled = s;
    }

    // --- SLOTS ---
    function initStrips() {
        document.querySelectorAll('.reel-strip').forEach(s => {
            s.innerHTML = '';
            for(let i=0; i<110; i++) {
                let d = document.createElement('div'); d.className='symbol';
                let img = document.createElement('img'); img.src = textures[Math.floor(Math.random()*4)];
                d.appendChild(img); s.appendChild(d);
            }
        });
    }
    initStrips();

    async function startSlots() {
        const bet = parseInt(document.getElementById('slotBet').value);
        if(!bet || bet > user.balance || bet <= 0) return;
        lockUI(true); await sync(-bet);
        const res = [];
        const strips = document.querySelectorAll('.reel-strip'), sH = strips[0].firstElementChild.clientHeight;
        strips.forEach((s, i) => {
            const w = Math.floor(Math.random()*4); res.push(w);
            s.children[101].querySelector('img').src = textures[w];
            s.style.transition = 'none'; s.style.transform = 'translateY(0)';
            void s.offsetWidth;
            s.style.transition = `transform ${2 + (i * 0.8)}s cubic-bezier(0.1, 0, 0, 1)`;
            s.style.transform = `translateY(-${100 * sH}px)`;
        });
        setTimeout(async () => {
            const c = {}; res.forEach(v => c[v] = (c[v]||0)+1);
            const max = Math.max(...Object.values(c));
            let m = 0; if(max === 4) m = 2; else if(max === 5) m = 8; else if(max === 6) m = 128; else if(max === 7) m = 512;
            if(m > 0) await sync(bet * m);
            lockUI(false);
        }, 8000);
    }

    // --- UPGRADER ---
    const canvas = document.getElementById('upgradeCanvas'), ctx = canvas.getContext('2d');
    function drawUpgrade() {
        const c = document.getElementById('upRange').value, a = parseInt(document.getElementById('upAmount').value)||0;
        document.getElementById('upChanceCenter').innerText = c+'%';
        document.getElementById('upPayout').innerText = Math.floor(a*(100/c*0.95)) + " руб.";
        ctx.clearRect(0,0,400,400);
        ctx.beginPath(); ctx.arc(200,200,180,0,Math.PI*2); ctx.strokeStyle='#1a1a20'; ctx.lineWidth=28; ctx.stroke();
        ctx.beginPath(); ctx.arc(200,200,180,0, (Math.PI*2)*(c/100)); ctx.strokeStyle='#ffb800'; ctx.lineWidth=28; ctx.stroke();
    }

    async function startUpgrade() {
        const a = parseInt(document.getElementById('upAmount').value), c = parseInt(document.getElementById('upRange').value);
        if(!a || a > user.balance || a <= 0) return;
        lockUI(true); await sync(-a);
        const target = (360 * 6) + (Math.random() * 360);
        const orb = document.getElementById('orbPath');
        orb.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.1, 1)';
        orb.style.transform = `rotate(${target}deg)`;
        setTimeout(async () => {
            if((target % 360) <= (c/100 * 360)) await sync(Math.floor(a*(100/c*0.95)));
            orb.style.transition = 'none'; orb.style.transform = 'rotate(0deg)';
            lockUI(false);
        }, 4500);
    }

    // --- ROCKET ---
    let crA = false, crInt, crM = 1.0, crCan = false;
    async function toggleCrash() {
        const b = parseInt(document.getElementById('crashBet').value), btn = document.getElementById('crashBtn'), r = document.getElementById('rocketContainer');
        if(!crA) {
            if(!b || b > user.balance || b <= 0) return;
            lockUI(true); await sync(-b);
            crA = true; crCan = true; crM = 1.0;
            let boom = (96 / (100 - Math.random() * 99.5)); 
            if(boom < 1) boom = 1.0;
            btn.innerText = "ЗАБРАТЬ"; btn.classList.add('btn-danger'); btn.disabled = false;
            crInt = setInterval(() => {
                crM += 0.009 * Math.pow(crM, 1.05);
                document.getElementById('crashMultiplier').innerText = "x" + crM.toFixed(2);
                r.style.bottom = Math.min(300, 20 + (crM * 20)) + "px";
                if(crM >= boom) {
                    clearInterval(crInt); crCan = false;
                    document.getElementById('crashMultiplier').innerText = "УЛЕТЕЛА!";
                    r.classList.add('rocket-fly-away');
                    btn.disabled = true;
                    setTimeout(resetRocket, 3000);
                }
            }, 50);
        } else {
            if(!crCan) return;
            crCan = false; clearInterval(crInt);
            await sync(Math.floor(b * crM));
            document.getElementById('crashMultiplier').innerText = "В КАРМАНЕ!";
            btn.disabled = true;
            setTimeout(resetRocket, 1500);
        }
    }

    function resetRocket() {
        const btn = document.getElementById('crashBtn'), r = document.getElementById('rocketContainer');
        r.classList.remove('rocket-fly-away');
        r.style.transition = 'none'; r.style.bottom = '20px';
        document.getElementById('crashMultiplier').innerText = "x1.00";
        btn.innerText = "ВЗЛЕТ"; btn.classList.remove('btn-danger'); btn.disabled = false;
        crA = false; lockUI(false);
    }

    function switchTab(id, el) { 
        if(isGameRunning) return;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
        if(id==='upgrader') drawUpgrade();
    }
    drawUpgrade();
</script>
</body>
</html>
