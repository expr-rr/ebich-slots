<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЁБЫЧ SLOTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050507; --panel: #0f0f13; --accent: #ffb800; --success: #00ff85;
            --danger: #ff4b4b; --text: #ffffff;
        }
        
        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; 
        }

        /* --- FIXED HEADER --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            background: #0f0f13; /* Сплошной фон */
            border-bottom: 1px solid #1c1c21; 
            display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; 
            z-index: 9999; /* Поверх всего */
        }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .site-icon { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--accent); }
        .logo { font-weight: 900; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; color: #fff; }
        .logo span { color: var(--accent); }

        .user-section { display: flex; align-items: center; gap: 15px; }
        .user-nickname { 
            color: #aaa; font-size: 11px; text-transform: uppercase; 
            border-bottom: 1px solid #333; cursor: pointer;
        }
        .balance-frame { 
            background: #16161c; padding: 10px 15px; border-radius: 10px; 
            border: 1px solid #222; cursor: pointer; text-align: center;
        }
        .bal-val { 
            font-weight: 400; /* Не жирный */
            color: #ffffff; /* Белый цвет */
            font-size: 15px; 
        }

        /* --- NAVIGATION --- */
        .nav-tabs { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: #0f0f13; display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid #1c1c24; z-index: 9999;
        }
        .tab-link { color: #555; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 10px; transition: 0.3s; }
        .tab-link.active { color: var(--accent); }

        /* --- CONTAINER --- */
        .container { 
            margin-top: 100px; /* Большой отступ сверху, чтобы не накладывалось на баланс */
            padding: 15px; padding-bottom: 100px; 
            display: flex; justify-content: center; 
        }
        .page { display: none; width: 100%; max-width: 600px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- GAMES UI --- */
        .reels-area { 
            position: relative; display: flex; gap: 5px; justify-content: center; 
            background: #000; padding: 10px; border-radius: 20px; margin-bottom: 20px; 
            overflow: hidden; height: 300px; border: 1px solid #1c1c24;
        }
        .win-frame { 
            position: absolute; top: 50%; left: 0; width: 100%; height: 90px; 
            transform: translateY(-50%); border-top: 2px solid var(--accent); 
            border-bottom: 2px solid var(--accent); background: rgba(255,184,0,0.05); z-index: 10; 
        }
        .reel { flex: 1; background: #07070a; position: relative; overflow: hidden; border-radius: 10px; }
        .symbol { height: 90px; display: flex; align-items: center; justify-content: center; }
        .symbol img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; }

        .canvas-area { 
            background: #000; border-radius: 20px; height: 350px; position: relative; 
            overflow: hidden; border: 1px solid #1c1c24; margin-bottom: 20px;
        }
        #crashMultiplier { position: absolute; top: 50px; width: 100%; text-align: center; font-size: 55px; font-weight: 900; }
        .rocket-container { position: absolute; width: 80px; height: 80px; left: calc(50% - 40px); bottom: 20px; }
        .rocket-img { width: 100%; height: 100%; background: url('rocket.png') no-repeat center; background-size: contain; }

        /* --- CONTROLS --- */
        .controls-box { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .auth-input { 
            width: 100%; background: #0f0f13; border: 1px solid #25252b; color: #fff; 
            padding: 18px; border-radius: 15px; font-family: 'Montserrat'; text-align: center; font-size: 16px; 
        }
        .btn-main { 
            width: 100%; padding: 20px; background: linear-gradient(135deg, var(--accent) 0%, #ff8a00 100%); 
            border: none; border-radius: 15px; color: #000; font-weight: 900; font-size: 16px; 
            cursor: pointer; text-transform: uppercase; 
        }
        .btn-main:disabled { filter: grayscale(1); opacity: 0.5; }

        /* --- MODALS --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 10000; justify-content: center; align-items: center; }
        .modal-card { background: #0f0f13; border: 1px solid #222; width: 90%; max-width: 380px; padding: 40px 25px; border-radius: 30px; text-align: center; }

        /* UPGRADER */
        .visual-box { position: relative; width: 280px; height: 280px; margin: 0 auto 20px; }
        #upgradeCanvas { width: 100%; height: 100%; }
        .orb-path { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .orb-triangle { position: absolute; top: -10px; left: calc(50% - 15px); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fff; }

        @media (max-width: 500px) {
            .logo { font-size: 12px; }
            .site-icon { width: 28px; height: 28px; }
            .bal-val { font-size: 13px; }
            header { height: 70px; padding: 0 10px; }
            .container { margin-top: 90px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="icon.png" class="site-icon">
        <div class="logo">ЁБЫЧ <span>SLOTS</span></div>
    </div>
    <div class="user-section">
        <div class="user-nickname" id="userNameDisp" onclick="openProfile()">...</div>
        <div class="balance-frame" id="balanceBtn" onclick="openProfile()">
            <span class="bal-val" id="balanceDisplay">0 руб.</span>
        </div>
    </div>
</header>

<!-- NAV TABS -->
<div class="nav-tabs" id="navTabs">
    <div class="tab-link active" onclick="switchTab('slots', this)">Слоты</div>
    <div class="tab-link" onclick="switchTab('upgrader', this)">Апгрейд</div>
    <div class="tab-link" onclick="switchTab('rocket', this)">Ракетка</div>
</div>

<div class="modal-overlay" id="authModal" style="display: flex;">
    <div class="modal-card">
        <h2 style="margin-top:0;">ВХОД</h2>
        <input type="text" id="authName" class="auth-input" placeholder="НИКНЕЙМ" style="margin-bottom:10px;">
        <input type="password" id="authPass" class="auth-input" placeholder="ПАРОЛЬ" style="margin-bottom:20px;">
        <button class="btn-main" onclick="handleLogin()">ИГРАТЬ</button>
    </div>
</div>

<div class="modal-overlay" id="profileModal" onclick="this.style.display='none'">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h3 id="profName">ПРОФИЛЬ</h3>
        <button class="btn-main" style="background:#222; color:#fff;" onclick="logout()">ВЫЙТИ</button>
    </div>
</div>

<div class="container">
    <!-- SLOTS -->
    <div id="slots" class="page active">
        <div class="reels-area">
            <div class="win-frame"></div>
            <div class="reel"><div class="reel-strip"></div></div>
            <div class="reel"><div class="reel-strip"></div></div>
            <div class="reel"><div class="reel-strip"></div></div>
            <div class="reel"><div class="reel-strip"></div></div>
            <div class="reel"><div class="reel-strip"></div></div>
        </div>
        <div class="controls-box">
            <input type="number" id="slotBet" value="100" class="auth-input">
            <button class="btn-main" id="spinBtn" onclick="startSlots()">Крутить</button>
        </div>
    </div>

    <!-- UPGRADER -->
    <div id="upgrader" class="page">
        <div class="visual-box">
            <canvas id="upgradeCanvas" width="400" height="400"></canvas>
            <div class="orb-path" id="orbPath"><div class="orb-triangle"></div></div>
            <div id="upChanceCenter" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:30px; font-weight:900;">50%</div>
        </div>
        <div class="controls-box">
            <input type="number" id="upAmount" value="500" class="auth-input" oninput="drawUpgrade()">
            <input type="range" id="upRange" min="1" max="85" value="50" oninput="drawUpgrade()" style="width:100%; accent-color: var(--accent);">
            <div id="upPayout" style="color:var(--success); font-size:20px; font-weight:900; text-align:center;">950 руб.</div>
            <button class="btn-main" id="upBtn" onclick="startUpgrade()">Улучшить</button>
        </div>
    </div>

    <!-- ROCKET -->
    <div id="rocket" class="page">
        <div class="canvas-area">
            <div id="crashMultiplier">x1.00</div>
            <div id="rocketContainer" class="rocket-container"><div class="rocket-img"></div></div>
        </div>
        <div class="controls-box">
            <input type="number" id="crashBet" value="100" class="auth-input">
            <button class="btn-main" id="crashBtn" onclick="toggleCrash()">Взлет</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://gwtbnjoacgirwsbwnaan.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3dGJuam9hY2dpcndzYnduYWFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNjM0NTgsImV4cCI6MjA5OTYzOTQ1OH0.ga9HERWc7gXq9VWn8U5lpBon-YhwBjPWp5ENwUYyutU';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let user = null;
    let isGameRunning = false;
    const textures = ['slot1.png', 'slot2.png', 'slot3.png', 'slot4.png'];

    async function handleLogin() {
        const name = document.getElementById('authName').value.trim().toLowerCase();
        const pass = document.getElementById('authPass').value;
        if(!name || !pass) return alert("Заполни поля");

        let { data } = await sb.from('players').select('*').eq('username', name).single();
        if(!data) {
            const { data: newUser } = await sb.from('players').insert([{ username: name, password: pass, balance: 10000, total_won: 0, total_lost: 0 }]).select().single();
            user = newUser;
        } else {
            if(data.password !== pass) return alert("Ошибка пароля");
            user = data;
        }
        localStorage.setItem('ebych_session_name', name);
        document.getElementById('authModal').style.display = 'none';
        updateUI();
    }

    async function checkAuth() {
        const name = localStorage.getItem('ebych_session_name');
        if(name) {
            let { data } = await sb.from('players').select('*').eq('username', name).single();
            if(data) { user = data; document.getElementById('authModal').style.display = 'none'; updateUI(); }
        }
    }
    checkAuth();

    function logout() { localStorage.removeItem('ebych_session_name'); location.reload(); }

    function updateUI() {
        if(!user) return;
        document.getElementById('userNameDisp').innerText = user.username;
        document.getElementById('balanceDisplay').innerText = Math.floor(user.balance).toLocaleString() + " руб.";
    }

    async function sync(diff) {
        user.balance += diff;
        updateUI();
        await sb.from('players').update({ balance: user.balance }).eq('username', user.username);
    }

    function switchTab(id, el) {
        if(isGameRunning) return;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id==='upgrader') drawUpgrade();
    }

    // SLOTS
    function initStrips() {
        document.querySelectorAll('.reel-strip').forEach(s => {
            s.innerHTML = '';
            for(let i=0; i<105; i++) {
                let d = document.createElement('div'); d.className='symbol';
                let img = document.createElement('img'); img.src = textures[Math.floor(Math.random()*4)];
                d.appendChild(img); s.appendChild(d);
            }
        });
    }
    initStrips();

    async function startSlots() {
        const bet = parseInt(document.getElementById('slotBet').value);
        if(bet > user.balance || bet <= 0) return alert("Недостаточно баланса");
        
        lockUI(true);
        await sync(-bet);
        
        const res = [];
        const strips = document.querySelectorAll('.reel-strip');
        strips.forEach((s, i) => {
            const winVal = Math.floor(Math.random()*4);
            res.push(winVal);
            s.children[100].querySelector('img').src = textures[winVal];
            s.style.transition = 'none'; s.style.transform = 'translateY(0)';
            void s.offsetWidth;
            s.style.transition = `transform ${2 + (i*0.5)}s cubic-bezier(0.1, 0, 0, 1)`;
            s.style.transform = `translateY(-9000px)`;
        });

        setTimeout(async () => {
            lockUI(false);
            const c = {}; res.forEach(x => c[x] = (c[x]||0)+1);
            const max = Math.max(...Object.values(c));
            if(max >= 3) {
                let win = bet * (max === 3 ? 2 : max === 4 ? 10 : 50);
                await sync(win);
                alert("Победа: " + win + " руб.");
            }
        }, 4500);
    }

    // UPGRADER
    const canvas = document.getElementById('upgradeCanvas'), ctx = canvas.getContext('2d');
    function drawUpgrade() {
        const c = document.getElementById('upRange').value;
        const a = parseInt(document.getElementById('upAmount').value)||0;
        document.getElementById('upChanceCenter').innerText = c+'%';
        document.getElementById('upPayout').innerText = Math.floor(a*(100/c*0.95)) + " руб.";
        ctx.clearRect(0,0,400,400);
        ctx.beginPath(); ctx.arc(200,200,180,0,Math.PI*2); ctx.strokeStyle='#1a1a20'; ctx.lineWidth=20; ctx.stroke();
        ctx.beginPath(); ctx.arc(200,200,180,-Math.PI/2, (-Math.PI/2) + (Math.PI*2)*(c/100)); ctx.strokeStyle='#ffb800'; ctx.lineWidth=20; ctx.stroke();
    }

    async function startUpgrade() {
        const a = parseInt(document.getElementById('upAmount').value), c = parseInt(document.getElementById('upRange').value);
        if(a > user.balance || a <= 0) return;
        lockUI(true); await sync(-a);
        const target = (360 * 5) + (Math.random() * 360);
        const orb = document.getElementById('orbPath');
        orb.animate([{transform:'rotate(0deg)'}, {transform:`rotate(${target}deg)`}], {duration:3000, easing:'cubic-bezier(0.2,0,0,1)', fill:'forwards'});
        setTimeout(async () => {
            if((target % 360) <= (c/100*360)) {
                let w = Math.floor(a*(100/c*0.95));
                await sync(w);
            }
            lockUI(false);
        }, 3200);
    }

    // ROCKET
    let crActive = false, crInt, crM = 1.0;
    async function toggleCrash() {
        const bet = parseInt(document.getElementById('crashBet').value);
        if(!crActive) {
            if(bet > user.balance || bet <= 0) return;
            lockUI(true); await sync(-bet);
            crActive = true; crM = 1.0;
            let boom = (100 / (100 - Math.random() * 97));
            document.getElementById('crashBtn').innerText = "ЗАБРАТЬ";
            crInt = setInterval(() => {
                crM += 0.01 * (crM);
                document.getElementById('crashMultiplier').innerText = "x" + crM.toFixed(2);
                document.getElementById('rocketContainer').style.bottom = Math.min(250, 20 + (crM * 10)) + "px";
                if(crM >= boom) {
                    clearInterval(crInt); crActive = false;
                    document.getElementById('crashMultiplier').innerText = "BOOM";
                    setTimeout(() => { lockUI(false); document.getElementById('crashBtn').innerText = "ВЗЛЕТ"; }, 2000);
                }
            }, 50);
        } else {
            clearInterval(crInt); crActive = false;
            let w = Math.floor(bet * crM);
            await sync(w);
            document.getElementById('crashBtn').innerText = "ВЗЛЕТ";
            lockUI(false);
        }
    }

    function lockUI(s) { 
        isGameRunning = s; 
        document.getElementById('spinBtn').disabled = s;
        document.getElementById('upBtn').disabled = s;
        document.getElementById('navTabs').style.opacity = s ? "0.5" : "1";
    }

    function openProfile() { document.getElementById('profileModal').style.display='flex'; }
    drawUpgrade();
</script>
</body>
</html>
